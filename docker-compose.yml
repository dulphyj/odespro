services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: odespro-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: odespro
      POSTGRES_USER: odespro
      POSTGRES_PASSWORD: odespro_secret_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/010-init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/020-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odespro"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: odespro-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: odespro
      MINIO_ROOT_PASSWORD: odespro_minio_2026
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "mc alias set local http://localhost:9000 odespro odespro_minio_2026 && mc ready local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: odespro-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://odespro:odespro_secret_2026@postgres:5432/odespro
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: odespro
      MINIO_SECRET_KEY: odespro_minio_2026
      MINIO_SECURE: "false"
      SECRET_KEY: super-secret-key-odespro-2026
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      OCR_SERVICE_URL: http://ocr-service:8001
      SCANNER_AGENT_URL: http://scanner-agent:5000
      CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000","http://localhost","http://127.0.0.1"]'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost/api/v1
        NEXT_PUBLIC_SCANNER_AGENT_URL: http://localhost:5000
    container_name: odespro-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api/v1
      NEXT_PUBLIC_SCANNER_AGENT_URL: http://localhost:5000
    depends_on:
      - backend

  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: odespro-ocr
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PADDLE_OCR_LANG: spanish
    volumes:
      - ocr_models:/root/.paddleocr

  scanner-agent:
    build:
      context: ./scanner-agent
      # Use Dockerfile for native .NET images (requires MCR access)
      # Use Dockerfile.selfcontained when MCR is blocked (run build-scanner.ps1 first)
      dockerfile: Dockerfile.selfcontained
    container_name: odespro-scanner
    restart: unless-stopped
    ports:
      - "5000:5000"
    # Privileged mode is needed for USB scanner access (SANE)
    # On Windows + Docker Desktop running with WSL2 backend:
    #   install usbipd-win -> attach scanner to WSL -> container sees it
    privileged: true
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:5000
      BACKEND_URL: http://backend:8000
      SCANNER_PROVIDER: sane

  nginx:
    image: nginx:alpine
    container_name: odespro-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
      - minio

volumes:
  postgres_data:
  minio_data:
  ocr_models:
